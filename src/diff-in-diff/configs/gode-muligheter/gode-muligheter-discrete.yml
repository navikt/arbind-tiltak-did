# ── Analysis parameters ────────────────────────────────────────────────────────
analysis:
  title: "DiD-analyse for innsatsgruppen 'gode muligheter' (diskret)"
  treatment_start: "202506"   # First month of treatment (YYYYMM)
  data_start:      "202010"   # First month of the full panel
  data_end:        "202509"   # Last month of the full panel
  treatment_type:  "discrete"  # "continuous" or "discrete"
  variation:       regioner

  # Denominator definitions compared in the exploratory treatment analysis.
  # Each entry produces a separate treatment variable series.
  #   peak     – denominator is the highest tiltak count in the pre-period
  #   last_pre – denominator is tiltak in the last month before treatment (t = -1)
  control_regions:
    - "Nav Innlandet"
    - "Nav Nordland"

# ── Data sources ───────────────────────────────────────────────────────────────
data:
  tiltak_file: data/raw/tiltak/midl.-lønnstilskudd.csv

  indikatorer:
    - name:        atid3
      file:        data/raw/indikatorer/nedbrytning/innsatsgruppe_-_gode_muligheter/atid3.csv
      description: "Arbeidstid neste tre måneder"

    - name:        jobb3
      file:        data/raw/indikatorer/nedbrytning/innsatsgruppe_-_gode_muligheter/jobb3.csv
      description: "I jobb etter 3 måneder"
